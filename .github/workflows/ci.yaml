name: Crew Service CI        # 이 작업의 이름

on:
  push: # 언제 실행할지

jobs:
  build:
    runs-on: ubuntu-latest # 어떤 작업을 할지

    steps:       # 작업을 어떤 순서로 할지
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

